name: Build Butterfly unsigned iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Butterfly source
        run: unzip -q Butterfly-iOS-GitHub-v2.0.1.zip -d source

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: source
        run: |
          npm install --no-package-lock
          npm install --no-save --no-package-lock @capacitor/ios@^8.0.0

      - name: Verify and build web application
        working-directory: source
        run: |
          npm run typecheck
          npm run lint
          npm test
          npm run build

      - name: Create and prepare iOS project
        working-directory: source
        run: |
          npx cap add ios --packagemanager SPM
          npm run ios:prepare

      - name: Verify native plugins
        working-directory: source
        run: |
          grep -R "ButterflyNative" ios/App/App.xcodeproj ios/App/CapApp-SPM 2>/dev/null
          grep -R "CredentialVault" ios/App 2>/dev/null

      - name: Build unsigned ARM64 IPA
        working-directory: source
        run: bash scripts/build-unsigned-ipa.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Butterfly-ios-unsigned-v2.0.1
          path: |
            source/Butterfly-unsigned.ipa
            source/Butterfly-unsigned.sha256
          if-no-files-found: error
          retention-days: 30
